<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZARA · Menu</title>
  <!-- Fonte Hanken Grotesk + Libre Caslon Text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & base herdado do style.css ===== */
    html, body {
      min-height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #FFFFFF;
      min-height: 100vh;
      padding: 20px 0;
    }
    .stage {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
    }

    /* ===== Estilos da tela Menu ===== */
    .menu-frame {
      width: 402px;
      background: #F9F9F9;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-height: 100vh;
    }

    /* Header */
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #F9F9F9;
      border-bottom: 1px solid #CFC4C5;
      position: relative;
      z-index: 2;
    }
    .menu-header .header-icon {
      background: none;
      border: none;
      cursor: pointer;
      width: 24px;
      height: 24px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-header .header-icon svg {
      width: 100%;
      height: 100%;
    }
    .menu-logo {
      font-family: 'Libre Caslon Text', serif;
      font-weight: 400;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -5%;
      color: #000000;
      margin: 0;
      flex: 1;
      text-align: center;
    }

    /* Main content */
    .menu-main {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 32px 20px 120px 20px;
      width: 100%;
      box-sizing: border-box;
      flex: 1;
    }

    /* Menu title */
    .menu-title {
      font-family: 'Libre Caslon Text', serif;
      font-weight: 400;
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: -2%;
      color: #1A1C1C;
      margin: 0 0 32px 0;
    }

    /* Menu list */
    .menu-list {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #CFC4C5;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .menu-item:hover {
      opacity: 0.7;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item .item-label {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 5%;
      text-transform: uppercase;
      color: #1A1C1C;
    }

    .menu-item .item-icon {
      color: #5D5F5F;
      display: flex;
      align-items: center;
    }

    .menu-item .item-icon svg {
      width: 20px;
      height: 20px;
    }

    /* Footer */
    .menu-footer {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 20px;
      width: 100%;
      background: #F3F3F3;
      border-top: 1px solid #CFC4C5;
      box-sizing: border-box;
      margin-top: auto;
    }
    .menu-footer .footer-brand {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 700;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: 10%;
      color: #1A1C1C;
      margin: 0;
    }
    .menu-footer .footer-nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 12px 0 0 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .menu-footer .footer-nav a {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.5;
      color: #5D5F5F;
      text-decoration: none;
    }
    .menu-footer .footer-nav a:hover {
      text-decoration: underline;
    }
    .menu-footer .footer-copy {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.6;
      color: #1A1C1C;
      margin: 12px 0 0 0;
    }

    /* Bottom navigation */
    .bottom-nav {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
      width: 100%;
      height: 64px;
      background: #F9F9F9;
      border-top: 1px solid #CFC4C5;
      box-sizing: border-box;
    }
    .bottom-nav .nav-icon {
      background: none;
      border: none;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
    }
    .bottom-nav .nav-icon svg {
      width: 20px;
      height: 20px;
    }

    /* Responsive */
    @media (max-width: 420px) {
      .menu-frame {
        width: 100%;
        max-width: 402px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">

      <!-- HEADER -->
      <div class="menu-header">
        <button class="header-icon" aria-label="Voltar">

        <button class="header-icon" aria-label="Carrinho">

            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>

      </div>

      <!-- MAIN -->
      <div class="menu-main">
        <h1 class="menu-title">MENU</h1>

        <div class="menu-list">
          <a href="#" class="menu-item">

                <polyline points="9 18 15 12 9 6"></polyline>

            </span>
          </a>

          <a href="#" class="menu-item">
            <span class="item-label">COLLECTIONS</span>
            <span class="item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </span>
          </a>

          <a href="#" class="menu-item">
            <span class="item-label">MEN</span>
            <span class="item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </span>
          </a>

          <a href="#" class="menu-item">
            <span class="item-label">WOMEN</span>
            <span class="item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </span>
          </a>

          <a href="#" class="menu-item">
            <span class="item-label">ACCOUNT</span>
            <span class="item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>

          </a>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="menu-footer">
        <p class="footer-brand">MODA MINIMALISTA</p>
        <div class="footer-nav">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Contact</a>
        </div>
        <p class="footer-copy">© 2024 MODA MINIMALISTA</p>
      </div>

      <!-- BOTTOM NAV -->
      <div class="bottom-nav">
        <button class="nav-icon" aria-label="Início">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
        </button>
        <button class="nav-icon" aria-label="Busca">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="nav-icon" aria-label="Favoritos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"></path>

        <button class="nav-icon" aria-label="Perfil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>

      </div>

    </div>
  </div>
</body>
</html>
