<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zara - Wireframe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="script.js"></script>
  <div class="stage">
    <div class="frame" data-name="Tela Inicial - iPhone 17">
      
      <!-- Header - TopAppBar -->
      <div class="frame" data-name="Header - TopAppBar from JSON">
        <div class="frame" data-name="Container">
          <button class="header-icon" data-name="Menu" aria-label="Menu">
            <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
              <line x1="0" y1="1" x2="17" y2="1" stroke="#000" stroke-width="1.5"/>
              <line x1="0" y1="5.5" x2="17" y2="5.5" stroke="#000" stroke-width="1.5"/>
              <line x1="0" y1="10" x2="17" y2="10" stroke="#000" stroke-width="1.5"/>
            </svg>
          </button>
        </div>
        <div class="frame" data-name="Heading 1">
          <div class="text" data-name="ZARA">ZARA</div>
        </div>
        <div class="frame" data-name="Container">
          <button class="header-icon" data-name="ShoppingBag" aria-label="Shopping Bag">
            <svg width="15" height="19" viewBox="0 0 15 19" fill="none">
              <rect x="2" y="4" width="11" height="14" stroke="#000" stroke-width="1.5"/>
              <path d="M4 4C4 2.34315 5.34315 1 7 1C8.65685 1 10 2.34315 10 4" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="frame" data-name="Main">
        
        <!-- Hero Section -->
        <div class="frame" data-name="Hero Section">
          <div class="frame" data-name="AB6AXuA3o109uOFL4l4xbF6n_P_7IzZ3s7RmqRXBVyrZGiOgD06fycFqWuIoeeVb9dusmCGiLjtLy3a1uBB9UPKk8MSgTyCyYG-LbPhRm1ENObQf7d7mTYchHyhLtRb9HqzBEiBZPTUWMbEAfqZtLgfxtlADcf4BoS2ffMJYN3wT99L42ybWApi_A85vkmH9ypiHFxYi9DHs8Zr2TPFQu4QubJkL8ZD5ROCbiWh9NaHU6ZSGLhMJbFwT">
            <img class="hero-image" src="assets/figma/hero-image.png" alt="Coleção de Outono" />
          </div>
          <div class="frame" data-name="Container">
            <div class="frame" data-name="Heading 1">
              <div class="text" data-name="Essencial">Essencial</div>
            </div>
            <div class="frame" data-name="Container">
              <div class="text" data-name="Coleção de Outono '24">Coleção de Outono '24</div>
            </div>
          </div>
        </div>

        <!-- Featured Product Section -->
        <div class="frame" data-name="Featured Product Section (As per wireframe IMAGE_5)">
          <div class="frame" data-name="Container">
            <div class="frame" data-name="Background">
              <div class="frame" data-name="AB6AXuC0szJpEAOkzh2kEXTnKNalVAKtgqRn-VvyQwQI6T36F24Emdmen8yoyoS98lmxoi4rDTdJmk0a9pkLpqgIWARj2VfF4_xCuGrHOtCsls8cZI6kYDwiCKTo8RJthT_z84lL4QQ96RNwjt8P4LcPPPI6OT1VruPmptbAsFdapFCv-ZcmeCDe3waSAStsFqeL8u6LgB-29xT7FiLuK_u8UBT7D95LhhaU7Z0CLN_Fry2EJGu5Sr2xXjlw-dUj1SeHjM9iylJbT-Ker8Sg">
                <img class="featured-image" src="assets/figma/featured-product.png" alt="Exemplo de produto" />
              </div>
              <button class="featured-heart" aria-label="Favoritar">
                <svg width="20" height="18" viewBox="0 0 20 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M10 17s-6.5-4.3-9-8.5C-0.9 5.2 1.4 1 5 1c1.9 0 3.6 1 4.5 2.5C10.9 2 12.6 1 14.5 1c3.6 0 5.9 4.2 4 7.5C16.5 12.7 10 17 10 17z" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <div class="frame" data-name="Container">
              <div class="frame" data-name="Container">
                <div class="frame" data-name="Heading 3">
                  <div class="text" data-name="EXEMPLO DE PRODUTO">EXEMPLO DE PRODUTO</div>
                </div>
                <div class="frame" data-name="Container">
                  <div class="text" data-name="R$ 499,00">R$ 499,00</div>
                </div>
              </div>
            </div>
          </div>
          <div class="rectangle" data-name="Horizontal Divider (Inspired by wireframe line)"></div>
        </div>

        <!-- Asymmetric Grid Section -->
        <div class="frame" data-name="Asymmetric Grid Section">
          <div class="frame" data-name="Container">
            <div class="frame" data-name="Heading 2">
              <div class="text" data-name="Novidades">Novidades</div>
            </div>
          </div>

          <div class="frame" data-name="Container">
            <div class="frame" data-name="Background">
              <div class="frame" data-name="AB6AXuCZd3Lbxz-WbsTYba0D-NDVo5cT5VgobvG8yL0AkXZJc2fKXzbCam_k_qEVaSg6Jz7qt6gKz75VKBmLlyBmFfzJbhlDfdc2Mp18rs_P2P2o0BaHUqUTZJt_KEnO_QYSmL4lALYmMFzDHsl5NbMnu8oHCTm_Ebrqm2KcKDF1Yaz6XcmcEc3wH0RnsoiO_cl43LC0JR7_OCCiXXU15pmf7qb-btloxGodT0sfyYC4TlsPX551aj--_x5Pja_SriapQP0eS9sDFfDk0ePz">
                <img class="product-image" src="assets/figma/product1.png" alt="Vestido Linho" />
              </div>
            </div>
            <div class="frame" data-name="Container">
              <div class="frame" data-name="Container">
                <div class="text" data-name="VESTIDO LINHO">VESTIDO LINHO</div>
              </div>
              <div class="frame" data-name="Container">
                <div class="text" data-name="R$ 299,00">R$ 299,00</div>
              </div>
            </div>
          </div>

          <div class="frame" data-name="Container">
            <div class="frame" data-name="Background">
              <div class="frame" data-name="AB6AXuBdnoiZp9pTaaPO-qb_QBNkz-4Fug8vebUdLTKXgMI-XqpFjSjuH17cpXgOft7PrtQdNiwFRUtGxiFlRjRVNhX5EGliBE3AyTAMWnJAcYmUTeMwA2fmw3izSWl5tXAYcDAxAcbSCdRJsg90NbsVkgp3-DdRKgHvvyr9NLmHY-HQJfwf6SZJRNX78F5RnxI_gQneLfwXVUoeD6cQhjCwK7Kph2yamWThzBdteczl5C96O6w8AR3YqCPhxKFJAVStLiwwmhAgfxyruOlC">
                <img class="product-image" src="assets/figma/product2.png" alt="Bota Couro" />
              </div>
            </div>
            <div class="frame" data-name="Container">
              <div class="frame" data-name="Container">
                <div class="text" data-name="BOTA COURO">BOTA COURO</div>
              </div>
              <div class="frame" data-name="Container">
                <div class="text" data-name="R$ 759,00">R$ 759,00</div>
              </div>
            </div>
          </div>
        </div>

        <!-- CTA Button -->
        <div class="frame" data-name="CTA Section → Button">
          <div class="text" data-name="VER TODA A COLEÇÃO">VER TODA A COLEÇÃO</div>
        </div>

      </div>

      <!-- Footer -->
      <div class="frame" data-name="Footer Component">
        <div class="frame" data-name="Container">
          <div class="text" data-name="MODA MINIMALISTA">MODA MINIMALISTA</div>
        </div>
        <div class="frame" data-name="Nav:margin">
          <div class="frame" data-name="Nav">
            <div class="frame" data-name="Link">
              <div class="text" data-name="Privacy">Privacy</div>
            </div>
            <div class="frame" data-name="Link:margin">
              <div class="frame" data-name="Link">
                <div class="text" data-name="Terms">Terms</div>
              </div>
            </div>
            <div class="frame" data-name="Link:margin">
              <div class="frame" data-name="Link">
                <div class="text" data-name="Shipping">Shipping</div>
              </div>
            </div>
            <div class="frame" data-name="Link:margin">
              <div class="frame" data-name="Link">
                <div class="text" data-name="Contact">Contact</div>
              </div>
            </div>
          </div>
        </div>
        <div class="frame" data-name="Margin">
          <div class="text" data-name="© 2024 MODA MINIMALISTA">© 2024 MODA MINIMALISTA</div>
        </div>
      </div>

      <!-- Bottom Navigation Bar -->
      <div class="frame" data-name="BottomNavBar Component">
        <button class="bottom-nav-icon" aria-label="Home">
          <svg width="17" height="19" viewBox="0 0 17 19" fill="none">
            <path d="M2 8L8.5 2L15 8V16C15 17.1046 14.1046 18 13 18H4C2.89543 18 2 17.1046 2 16V8Z" stroke="#000" stroke-width="1.5" fill="none"/>
          </svg>
        </button>
        <button class="bottom-nav-icon" aria-label="Search">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
            <circle cx="7.5" cy="7.5" r="5" stroke="#000" stroke-width="1.5" fill="none"/>
            <line x1="11" y1="11" x2="15" y2="15" stroke="#000" stroke-width="1.5"/>
          </svg>
        </button>
        <button class="bottom-nav-icon" aria-label="Bag">
          <svg width="15" height="19" viewBox="0 0 15 19" fill="none">
            <rect x="2" y="4" width="11" height="14" stroke="#000" stroke-width="1.5"/>
            <path d="M4 4C4 2.34315 5.34315 1 7 1C8.65685 1 10 2.34315 10 4" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="bottom-nav-icon" aria-label="Profile">
          <svg width="17" height="19" viewBox="0 0 17 19" fill="none">
            <circle cx="8.5" cy="5" r="4" stroke="#000" stroke-width="1.5" fill="none"/>
            <path d="M2 16C2 13.2386 4.68629 11 8.5 11C12.3137 11 15 13.2386 15 16V17.5" stroke="#000" stroke-width="1.5" fill="none"/>
          </svg>
        </button>
      </div>

    </div>
  </div>
</body>
</html>
