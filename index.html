<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zara - Wireframe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stage">
    <div class="frame" data-name="Tela Inicial - iPhone 17">
      <div class="frame" data-name="Main">
        <div class="frame" data-name="Hero Section">
          <div class="frame" data-name="AB6AXuA3o109uOFL4l4xbF6n_P_7IzZ3s7RmqRXBVyrZGiOgD06fycFqWuIoeeVb9dusmCGiLjtLy3a1uBB9UPKk8MSgTyCyYG-LbPhRm1ENObQf7d7mTYchHyhLtRb9HqzBEiBZPTUWMbEAfqZtLgfxtlADcf4BoS2ffMJYN3wT99L42ybWApi_A85vkmH9ypiHFxYi9DHs8Zr2OZZXDOJ4bIkzug0VSjhJ13xm_Ri2TPFQu4QubJkL8ZD5ROCbiWh9NaHU6ZSGLhMJbFwT">
            <img src="assets/figma/hero_bg.png" alt="hero background">
          </div>
          <div class="frame" data-name="Container">
            <div class="frame" data-name="Heading 1">
              <div class="text" data-name="Essencial">Essencial</div>
            </div>
            <div class="frame" data-name="Container" style="opacity:0.9">
              <div class="text" data-name="Coleção de Outono '24">Coleção de Outono '24</div>
            </div>
          </div>
        </div>

        <div class="frame" data-name="Featured Product Section (As per wireframe IMAGE_5)">
          <div class="frame" data-name="Container">
            <div class="frame" data-name="Background">
              <img src="assets/figma/featured_bg.png" alt="featured background">
            </div>
            <div class="frame" data-name="Container">
              <div class="frame" data-name="Heading 3">
                <div class="text" data-name="EXEMPLO DE PRODUTO">EXEMPLO DE PRODUTO</div>
              </div>
              <div class="frame" data-name="Container">
                <div class="text" data-name="R$ 499,00">R$ 499,00</div>
              </div>
            </div>
          </div>
          <div class="rectangle" data-name="Horizontal Divider (Inspired by wireframe line)"></div>
        </div>

        <div class="frame" data-name="Asymmetric Grid Section">
          <div class="frame" data-name="Container">
            <div class="frame" data-name="Heading 2">
              <div class="text" data-name="Novidades">Novidades</div>
            </div>
          </div>

          <div class="frame" data-name="Container">
            <div class="frame" data-name="Background">
              <img src="assets/figma/asym_bg.png" alt="asymmetric background">
            </div>
            <div class="frame" data-name="Container">
              <div class="frame" data-name="Container">
                <div class="text" data-name="VESTIDO LINHO">VESTIDO LINHO</div>
              </div>
              <div class="frame" data-name="Container">
                <div class="text" data-name="R$ 299,00">R$ 299,00</div>
              </div>
            </div>
          </div>

          <div class="frame" data-name="Container">
            <div class="frame" data-name="Background">
              <img src="assets/figma/bota_bg.png" alt="bota background">
            </div>
            <div class="frame" data-name="Container">
              <div class="frame" data-name="Container">
                <div class="text" data-name="BOTA COURO">BOTA COURO</div>
              </div>
              <div class="frame" data-name="Container">
                <div class="text" data-name="R$ 759,00">R$ 759,00</div>
              </div>
            </div>
          </div>
        </div>

        <div class="frame" data-name="CTA Section → Button">
          <div class="text" data-name="VER TODA A COLEÇÃO">VER TODA A COLEÇÃO</div>
        </div>

      </div>

      <div class="frame" data-name="Footer Component">
        <div class="frame" data-name="Container">
          <div class="text" data-name="MODA MINIMALISTA">MODA MINIMALISTA</div>
        </div>
        <div class="frame" data-name="Nav:margin">
          <div class="frame" data-name="Nav">
            <div class="frame" data-name="Link"><div class="text" data-name="Privacy">Privacy</div></div>
            <div class="frame" data-name="Link:margin"><div class="text" data-name="Terms">Terms</div></div>
            <div class="frame" data-name="Link:margin"><div class="text" data-name="Shipping">Shipping</div></div>
            <div class="frame" data-name="Link:margin"><div class="text" data-name="Contact">Contact</div></div>
          </div>
        </div>
        <div class="frame" data-name="Margin">
          <div class="text" data-name="© 2024 MODA MINIMALISTA">© 2024 MODA MINIMALISTA</div>
        </div>
      </div>

      <div class="frame" data-name="Header - TopAppBar Component"></div>
      <div class="frame" data-name="BottomNavBar Component"></div>

      <div class="frame" data-name="Side Navigation Drawer (Hidden by default, for logic representation)">
        <div class="frame" data-name="Container">
          <div class="frame" data-name="Margin">
            <div class="frame" data-name="Container">
              <div class="frame" data-name="Container">
                <div class="text" data-name="MENU">MENU</div>
              </div>
              <div class="frame" data-name="Button"></div>
            </div>
          </div>
          <div class="frame" data-name="List:margin">
            <div class="frame" data-name="List">
              <div class="frame" data-name="Item"><div class="text" data-name="NEW ARRIVALS">NEW ARRIVALS</div></div>
              <div class="frame" data-name="Item"><div class="text" data-name="COLLECTIONS">COLLECTIONS</div></div>
              <div class="frame" data-name="Item"><div class="text" data-name="MEN">MEN</div></div>
              <div class="frame" data-name="Item"><div class="text" data-name="WOMEN">WOMEN</div></div>
              <div class="frame" data-name="Item"><div class="text" data-name="ACCOUNT">ACCOUNT</div></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>

<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</html>
