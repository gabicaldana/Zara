<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zara - Produto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="script.js"></script>
  <div class="product-stage">
    <div class="product-frame">
      <header class="product-topbar">
        <button class="header-icon" aria-label="Voltar">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 4L6 8.5L11 13" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="product-logo">ZARA</div>
        <button class="header-icon" aria-label="Carrinho">
          <svg width="15" height="19" viewBox="0 0 15 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="11" height="14" stroke="#000" stroke-width="1.5"/>
            <path d="M4 4C4 2.34315 5.34315 1 7 1C8.65685 1 10 2.34315 10 4" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </header>

      <main class="product-main">
        <section class="product-hero">
          <div class="product-hero-image">
            <img src="assets/figma/product-hero.png" alt="Vestido midi em seda" />
            <div class="hero-indicators" aria-label="Indicadores de imagem">
              <span></span>
              <span class="active"></span>
              <span></span>
            </div>
          </div>
        </section>

        <section class="product-details">
          <div class="product-details-heading">
            <h1>VESTIDO MIDI EM SEDA</h1>
            <div class="product-price">R$ 749,00</div>
          </div>
          <p class="product-description">Vestido midi confeccionado em seda pura com caimento fluido. Decote em V e alças finas ajustáveis. Uma peça atemporal para o guarda-roupa editorial.</p>

          <div class="product-attributes">
            <div class="attribute-group">
              <span class="attribute-label">COR</span>
              <div class="attribute-swatch"></div>
            </div>
            <div class="attribute-group">
              <span class="attribute-label">TAMANHO</span>
              <div class="attribute-sizes">
                <button class="size-option selected">P</button>
                <button class="size-option">M</button>
                <button class="size-option">G</button>
              </div>
            </div>
          </div>

          <button class="product-button">ADICIONAR AO CARRINHO</button>
        </section>

        <section class="product-accordion">
          <div class="accordion-row">
            <span>COMPOSIÇÃO E CUIDADOS</span>
            <span class="accordion-icon">+</span>
          </div>
          <div class="accordion-row">
            <span>ENVIO E DEVOLUÇÕES</span>
            <span class="accordion-icon">+</span>
          </div>
        </section>
      </main>

      <footer class="product-bottom-bar">
        <button class="bottom-nav-icon" aria-label="Home">
          <svg width="17" height="19" viewBox="0 0 17 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 8L8.5 2L15 8V16C15 17.1046 14.1046 18 13 18H4C2.89543 18 2 17.1046 2 16V8Z" stroke="#000" stroke-width="1.5" fill="none"/>
          </svg>
        </button>
        <button class="bottom-nav-icon" aria-label="Search">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="7.5" cy="7.5" r="5" stroke="#000" stroke-width="1.5" fill="none"/>
            <line x1="11" y1="11" x2="15" y2="15" stroke="#000" stroke-width="1.5"/>
          </svg>
        </button>
        <button class="bottom-nav-icon" aria-label="Bag">
          <svg width="15" height="19" viewBox="0 0 15 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="11" height="14" stroke="#000" stroke-width="1.5"/>
            <path d="M4 4C4 2.34315 5.34315 1 7 1C8.65685 1 10 2.34315 10 4" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="bottom-nav-icon" aria-label="Profile">
          <svg width="17" height="19" viewBox="0 0 17 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="5" r="4" stroke="#000" stroke-width="1.5" fill="none"/>
            <path d="M2 16C2 13.2386 4.68629 11 8.5 11C12.3137 11 15 13.2386 15 16V17.5" stroke="#000" stroke-width="1.5" fill="none"/>
          </svg>
        </button>
      </footer>
    </div>
  </div>
</body>
</html>
