<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZARA · Login</title>
  <!-- Fonte Hanken Grotesk + Libre Caslon Text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & base herdado do style.css ===== */
    html, body {
      min-height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #FFFFFF;
      min-height: 100vh;
      padding: 20px 0;
    }
    .stage {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
    }

    /* ===== Estilos da tela Login ===== */
    .login-frame {
      width: 402px;
      background: #F9F9F9;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-height: 100vh;
    }

    /* Header */
    .login-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #F9F9F9;
      border-bottom: 1px solid #CFC4C5;
      position: relative;
      z-index: 2;
    }
    .login-header .header-icon {
      background: none;
      border: none;
      cursor: pointer;
      width: 24px;
      height: 24px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-header .header-icon svg {
      width: 100%;
      height: 100%;
    }
    .login-logo {
      font-family: 'Libre Caslon Text', serif;
      font-weight: 400;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -5%;
      color: #000000;
      margin: 0;
      flex: 1;
      text-align: center;
    }

    /* Main content */
    .login-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 48px 20px 80px 20px;
      width: 100%;
      box-sizing: border-box;
      flex: 1;
    }

    /* Welcome section */
    .login-welcome {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-welcome h1 {
      font-family: 'Libre Caslon Text', serif;
      font-weight: 400;
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: -2%;
      color: #1A1C1C;
      margin: 0;
    }

    .login-welcome p {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.5;
      color: #5D5F5F;
      margin: 0;
    }

    /* Login form */
    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 10%;
      text-transform: uppercase;
      color: #1A1C1C;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #CFC4C5;
      border-radius: 8px;
      background: #FFFFFF;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: 16px;
      color: #1A1C1C;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #000000;
    }

    .form-group input::placeholder {
      color: #B0B0B0;
    }

    .form-group input[type="password"] {
      letter-spacing: 4px;
    }

    /* Login button */
    .login-btn {
      width: 100%;
      padding: 16px 0;
      border: none;
      background: #000000;
      color: #FFFFFF;
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 10%;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: #1A1C1C;
    }

    .login-btn:active {
      background: #333333;
    }

    /* Sign up link */
    .login-signup {
      text-align: center;
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #5D5F5F;
      margin: 0;
    }

    .login-signup a {
      color: #000000;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      padding-bottom: 2px;
    }

    .login-signup a:hover {
      opacity: 0.7;
    }

    /* Divider with "OU" */
    .login-divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .login-divider .line {
      flex: 1;
      height: 1px;
      background: #CFC4C5;
    }

    .login-divider .text {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 10%;
      text-transform: uppercase;
      color: #5D5F5F;
      white-space: nowrap;
    }

    /* Social login buttons */
    .login-social {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .social-btn {
      width: 100%;
      padding: 14px 0;
      border: 1px solid #CFC4C5;
      border-radius: 8px;
      background: #FFFFFF;
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: #1A1C1C;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .social-btn:hover {
      background: #F3F3F3;
      border-color: #000000;
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .social-btn.google svg {
      fill: #EA4335;
    }

    .social-btn.apple svg {
      fill: #000000;
    }

    /* Footer */
    .login-footer {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px 20px;
      width: 100%;
      background: #F3F3F3;
      border-top: 1px solid #CFC4C5;
      box-sizing: border-box;
      margin-top: auto;
    }
    .login-footer .footer-brand {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 700;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: 10%;
      color: #1A1C1C;
      margin: 0;
    }
    .login-footer .footer-nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 12px 0 0 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .login-footer .footer-nav a {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.5;
      color: #5D5F5F;
      text-decoration: none;
    }
    .login-footer .footer-nav a:hover {
      text-decoration: underline;
    }
    .login-footer .footer-copy {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.6;
      color: #1A1C1C;
      margin: 12px 0 0 0;
    }

    /* Responsive */
    @media (max-width: 420px) {
      .login-frame {
        width: 100%;
        max-width: 402px;
      }
    }
  </style>
</head>
<body>
    <script src="script.js"></script>
  <div class="stage">
    <div class="login-frame">

      <!-- HEADER -->
      <div class="login-header">
        <button class="header-icon" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <span class="login-logo">ZARA</span>
        <button class="header-icon" aria-label="Carrinho">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
        </button>
      </div>

      <!-- MAIN -->
      <div class="login-main">

        <!-- Welcome -->
        <div class="login-welcome">
          <h1>Bem-vindo de volta</h1>
          <p>Acesse sua curadoria exclusiva.</p>
        </div>

        <!-- Form -->
        <form class="login-form" onsubmit="event.preventDefault(); alert('Login realizado com sucesso!');">
          <div class="form-group">
            <label for="email">E-MAIL</label>
            <input type="email" id="email" placeholder="seu@email.com" value="seu@email.com">
          </div>

          <div class="form-group">
            <label for="password">SENHA</label>
            <input type="password" id="password" placeholder="********" value="********">
          </div>

          <button type="submit" class="login-btn">Entrar</button>
        </form>

        <!-- Sign up link -->
        <p class="login-signup">
          Criar uma conta
        </p>

        <!-- Divider -->
        <div class="login-divider">
          <span class="line"></span>
          <span class="text">OU</span>
          <span class="line"></span>
        </div>

        <!-- Social buttons -->
        <div class="login-social">
          <button class="social-btn google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuar com Google
          </button>

          <button class="social-btn apple">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            Continuar com Apple
          </button>
        </div>

      </div>

      <!-- FOOTER -->
      <div class="login-footer">
        <p class="footer-brand">MODA MINIMALISTA</p>
        <div class="footer-nav">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Contact</a>
        </div>
        <p class="footer-copy">© 2024 MODA MINIMALISTA</p>
      </div>

    </div>
  </div>
</body>
</html>
