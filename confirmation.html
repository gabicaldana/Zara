<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZARA · Pedido Confirmado</title>
  <!-- Fonte Hanken Grotesk + Libre Caslon Text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>
  <div class="stage">
    <!-- Tela de finalização (confirmação) -->
    <div class="finalize-frame">
      
      <!-- HEADER (igual ao style.css) -->
      <div class="finalize-header">
        <button class="header-icon" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <span class="finalize-logo">ZARA</span>
        <button class="header-icon" aria-label="Carrinho">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
        </button>
      </div>

      <!-- MAIN -->
      <div class="finalize-main">

        <!-- Card de confirmação -->
        <div class="confirmation-card">
          <p class="thank-you">Obrigado por comprar conosco!</p>
          <p class="order-status">PEDIDO CONFIRMADO</p>
          <div class="divider"></div>
          <p class="order-number">#ZR-2026-0617</p>
          <a href="#" class="cta-link">Ver meus pedidos</a>
        </div>

        <!-- Pode te interessar -->
        <div class="also-like">
          <p class="section-label">Pode te interessar:</p>
          <div class="product-row">
            <div class="product-item">
              <div class="product-thumb">
                <img src="assets/figma/Recommended Product 1.png" alt="BLAZER ESTRUTURADO">
              </div>
              <div class="product-info">
                <span class="product-name">BLAZER ESTRUTURADO</span>
                <span class="product-price">R$ 899,00</span>
              </div>
            </div>
            <div class="product-item">
              <div class="product-thumb">
                <img src="assets/figma/Recommended Product 2.png" alt="ACESSÓRIO ESSENCIAL">
              </div>
              <div class="product-info">
                <span class="product-name">ACESSÓRIO ESSENCIAL</span>
                <span class="product-price">R$ 450,00</span>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- FOOTER (igual ao da home) -->
      <div class="finalize-footer">
        <p class="footer-brand">MODA MINIMALISTA</p>
        <div class="footer-nav">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Contact</a>
        </div>
        <p class="footer-copy">© 2024 MODA MINIMALISTA</p>
      </div>

      <!-- Bottom Navigation (igual ao style.css) -->
      <div class="bottom-nav">
        <button class="nav-icon" aria-label="Início">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
        </button>
        <button class="nav-icon" aria-label="Busca">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="nav-icon" aria-label="Favoritos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"></path>
          </svg>
        </button>
        <button class="nav-icon" aria-label="Perfil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
      </div>

    </div>
  </div>
</body>
</html>
